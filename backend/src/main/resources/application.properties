spring.application.name=shopsphere-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/shopsphere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Sahithi@2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-base64-encoded-256-bit-value}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
